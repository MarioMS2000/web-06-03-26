<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Contacto | Mi web</title>
    <link rel="stylesheet" href="css/styles.css" />
</head>

<body>
    <header class="site-header">
        <nav class="nav" aria-label="Navegación principal">
            <a class="nav__logo" href="index.html">MiWeb</a>
            <ul class="nav__list">
                <li><a class="nav__link" href="index.html">Home</a></li>
                <li><a class="nav__link" href="biografia.html">Biografía</a></li>
                <li><a class="nav__link" href="portfolio.html">Portfolio</a></li>
                <li><a class="nav__link nav__link--active" href="contacto.html">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <section class="contact">
            <h1>Contacto</h1>
            <p>Rellena el formulario y te respondo lo antes posible.</p>

            <form class="form" action="#" method="post">
                <div class="form__row">
                    <label for="nombre">Nombre</label>
                    <input id="nombre" name="nombre" type="text" required placeholder="Tu nombre" />
                </div>

                <div class="form__row">
                    <label for="email">Email</label>
                    <input id="email" name="email" type="email" required placeholder="tu@email.com" />
                </div>

                <div class="form__row">
                    <label for="motivo">Motivo</label>
                    <select id="motivo" name="motivo" required>
                        <option value="">Selecciona…</option>
                        <option>Trabajo</option>
                        <option>Colaboración</option>
                        <option>Otro</option>
                    </select>
                </div>

                <div class="form__row">
                    <label for="mensaje">Mensaje</label>
                    <textarea id="mensaje" name="mensaje" rows="5" required placeholder="Cuéntame..."></textarea>
                </div>

                <button class="btn" type="submit">Enviar</button>
            </form>
        </section>
    </main>

    <footer class="site-footer">
        <p>© MiWeb</p>
    </footer>
</body>

</html>
